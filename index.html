<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>地理定位大挑戰</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #2c3e50; color: white; }
        .page { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        #map-page { display: none; height: 100vh; width: 100vw; position: relative; }
        #map { position: absolute; top: 60px; bottom: 0; width: 100%; cursor: crosshair; }
        .ui-bar { position: absolute; top: 0; width: 100%; height: 60px; background: #34495e; display: flex; align-items: center; justify-content: space-around; z-index: 1000; font-weight: bold; }
        button { padding: 20px 30px; font-size: 18px; border-radius: 12px; border: none; background: #3498db; color: white; margin: 10px; width: 80%; max-width: 300px; }
        .leaderboard-grid { display: flex; gap: 10px; width: 100%; justify-content: center; }
        .lb-col { flex: 1; font-size: 12px; }
        .score-animate { color: #f1c40f !important; transform: scale(1.5); transition: all 0.3s ease; }
        #score-ui { transition: all 0.3s ease; display: inline-block; }
    </style>
</head>
<body>
    <div id="home-page" class="page" style="display: flex;">
        <h1>地理定位大挑戰</h1>
        <button onclick="showPage('mode-page')">選擇模式</button>
        <button onclick="showPage('leaderboard-page')">查看排行榜</button>
    </div>

    <div id="mode-page" class="page">
        <h2>選擇挑戰類別</h2>
        <button onclick="startGame('首都')">首都挑戰</button>
        <button onclick="startGame('地標')">著名地標</button>
        <button onclick="startGame('自然')">自然風景</button>
        <button onclick="showPage('home-page')" style="background:#95a5a6">回首頁</button>
    </div>

    <div id="leaderboard-page" class="page">
        <h2>排行榜 (Top 5)</h2>
        <div class="leaderboard-grid">
            <div class="lb-col"><h3>首都</h3><div id="lb-首都"></div></div>
            <div class="lb-col"><h3>地標</h3><div id="lb-地標"></div></div>
            <div class="lb-col"><h3>自然</h3><div id="lb-自然"></div></div>
        </div>
        <button onclick="showPage('home-page')" style="background:#95a5a6; margin-top: 20px;">回首頁</button>
    </div>

    <div id="result-page" class="page">
        <h1>挑戰完成！</h1>
        <h2 id="final-score" style="font-size: 48px; color: #f1c40f;"></h2>
        <button onclick="showPage('home-page')">回首頁</button>
    </div>

    <div id="map-page">
        <div class="ui-bar">
            <span id="task-ui">請點擊目標</span>
            <span id="score-ui">總分: 0</span>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // (保持你的題庫與變數不變)
        let map, polyline, round, totalScore, currentTarget, remainingCities, currentCat, isLocked = false;
        const allQuestions = [
            { cat: '首都', name: "台北", lat: 25.033, lng: 121.565 }, { cat: '首都', name: "東京", lat: 35.676, lng: 139.650 }, { cat: '首都', name: "巴黎", lat: 48.856, lng: 2.352 }, { cat: '首都', name: "倫敦", lat: 51.507, lng: -0.127 }, { cat: '首都', name: "柏林", lat: 52.520, lng: 13.405 }, { cat: '首都', name: "羅馬", lat: 41.902, lng: 12.496 }, { cat: '首都', name: "馬德里", lat: 40.416, lng: -3.703 }, { cat: '首都', name: "莫斯科", lat: 55.755, lng: 37.617 }, { cat: '首都', name: "華盛頓", lat: 38.907, lng: -77.036 }, { cat: '首都', name: "渥太華", lat: 45.421, lng: -75.697 },
            { cat: '地標', name: "艾菲爾鐵塔", lat: 48.858, lng: 2.294 }, { cat: '地標', name: "自由女神像", lat: 40.689, lng: -74.044 }, { cat: '地標', name: "萬里長城", lat: 40.431, lng: 116.570 }, { cat: '地標', name: "金字塔", lat: 29.979, lng: 31.134 }, { cat: '地標', name: "泰姬瑪哈陵", lat: 27.175, lng: 78.042 }, { cat: '地標', name: "雪梨歌劇院", lat: -33.856, lng: 151.215 }, { cat: '地標', name: "羅馬競技場", lat: 41.890, lng: 12.492 }, { cat: '地標', name: "大笨鐘", lat: 51.500, lng: -0.124 }, { cat: '地標', name: "巨石陣", lat: 51.178, lng: -1.826 }, { cat: '地標', name: "吳哥窟", lat: 13.412, lng: 103.866 },
            { cat: '自然', name: "大峽谷", lat: 36.054, lng: -112.140 }, { cat: '自然', name: "富士山", lat: 35.360, lng: 138.727 }, { cat: '自然', name: "亞馬遜雨林", lat: -3.465, lng: -62.215 }, { cat: '自然', name: "喜馬拉雅山", lat: 27.988, lng: 86.925 }, { cat: '自然', name: "大堡礁", lat: -18.287, lng: 147.699 }, { cat: '自然', name: "撒哈拉沙漠", lat: 23.416, lng: 12.573 }, { cat: '自然', name: "尼加拉瀑布", lat: 43.079, lng: -79.073 }, { cat: '自然', name: "黃石公園", lat: 44.428, lng: -110.588 }, { cat: '自然', name: "死海", lat: 31.559, lng: 35.473 }, { cat: '自然', name: "貝加爾湖", lat: 53.558, lng: 108.185 }
        ];
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById('map-page').style.display = 'none';
            if(id === 'leaderboard-page') renderLeaderboard();
            document.getElementById(id).style.display = id === 'map-page' ? 'block' : 'flex';
        }

        function startGame(cat) {
            currentCat = cat;
            round = 1; totalScore = 0;
            remainingCities = allQuestions.filter(q => q.cat === cat).sort(() => Math.random() - 0.5).slice(0, 10);
            showPage('map-page');
            if(!map) initMap();
            document.getElementById('score-ui').innerText = "總分: 0";
            map.invalidateSize();
            nextRound();
        }

        function initMap() {
            map = L.map('map', { attributionControl: false, zoomControl: false, tap: false }).setView([20, 0], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', { noWrap: true }).addTo(map);
            map.on('click', (e) => {
                if (isLocked) return;
                isLocked = true;
                const dist = map.distance(e.latlng, [currentTarget.lat, currentTarget.lng]);
                const pts = Math.max(0, 100 - Math.floor(dist / 50000));
                totalScore += pts;
                
                // 動畫：分數更新
                const scoreEl = document.getElementById('score-ui');
                scoreEl.innerText = "總分: " + totalScore;
                scoreEl.classList.add('score-animate');
                setTimeout(() => scoreEl.classList.remove('score-animate'), 300);

                // 動畫：飄出分數
                const floatText = document.createElement('div');
                floatText.innerText = `+${pts}`;
                floatText.style.cssText = `position:absolute; left:${e.originalEvent.clientX}px; top:${e.originalEvent.clientY}px; color:#2ecc71; font-weight:bold; font-size:24px; z-index:2000; transition: all 1s ease-out; pointer-events:none;`;
                document.body.appendChild(floatText);
                setTimeout(() => { floatText.style.top = (parseInt(floatText.style.top) - 80) + 'px'; floatText.style.opacity = '0'; }, 10);
                setTimeout(() => floatText.remove(), 1000);

                if(polyline) map.removeLayer(polyline);
                polyline = L.polyline([e.latlng, [currentTarget.lat, currentTarget.lng]], {color: '#e74c3c', weight: 4}).addTo(map);
                setTimeout(() => { isLocked = false; nextRound(); }, 1500);
            });
        }

        function nextRound() {
            if (round > 10) {
                saveScore();
                // 這裡：遊戲結束，隱藏地圖，切換到 result-page
                document.getElementById('map-page').style.display = 'none';
                document.getElementById('final-score').innerText = "最終得分: " + totalScore;
                showPage('result-page');
                return;
            }
            if(polyline) map.removeLayer(polyline);
            currentTarget = remainingCities.pop();
            document.getElementById('task-ui').innerText = `第 ${round}/10 關：${currentTarget.name}`;
            round++;
        }
        
        // (saveScore 與 renderLeaderboard 函式維持原樣)
    </script>
</body>
</html>
