<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>地理定位大挑戰</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #map { height: 100vh; width: 100vw; cursor: crosshair; }
        /* 確保 UI 顯示在最上層 */
        #ui { position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(0,0,0,0.7); color: white; padding: 10px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui">地圖載入中...</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // 使用 window.onload 確保 HTML 元素已準備好
        window.onload = function() {
            // 1. 初始化地圖
            var map = L.map('map', {
                center: [20, 0],
                zoom: 2,
                attributionControl: false
            });

            // 2. 使用標準的無標籤圖層 (Stadia Maps 官方推薦路徑)
            // 請注意：路徑名稱中不應有空格，這裡改用 alidade_smooth_no_labels
            L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth_no_labels/{z}/{x}/{y}{r}.png?api_key=2c5f75f1-937e-48e9-9031-c5b0c24f6d23', {
                maxZoom: 20
            }).addTo(map);

            document.getElementById('ui').innerText = "地圖載入完成，請開始遊戲！";
            console.log("地圖初始化成功");
        };
    </script>
</body>
</html>
