function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    document.getElementById('map-page').style.display = 'none';
    if(id === 'leaderboard-page') renderLeaderboard();
    const target = document.getElementById(id);
    if (target) target.style.display = 'flex';
}

function startGame(cat) {
    currentCat = cat;
    round = 1; 
    totalScore = 0;
    remainingCities = allQuestions.filter(q => q.cat === cat).sort(() => Math.random() - 0.5).slice(0, 10);
    showPage('map-page');
    if(!map) initMap();
    document.getElementById('score-ui').innerText = "總分: 0";
    map.invalidateSize();
    loadNextQuestion();
}

function initMap() {
    map = L.map('map', { attributionControl: false, zoomControl: false, tap: false }).setView([20, 0], 2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', { noWrap: true }).addTo(map);
    map.on('click', onMapClick);
}

function onMapClick(e) {
    if (isLocked) return;
    isLocked = true;
    const dist = map.distance(e.latlng, [currentTarget.lat, currentTarget.lng]);
    const pts = Math.max(0, 100 - Math.floor(dist / 50000));
    totalScore += pts;
    document.getElementById('score-ui').innerText = "總分: " + totalScore;
    
    // 繪製連線
    if(polyline) map.removeLayer(polyline);
    polyline = L.polyline([e.latlng, [currentTarget.lat, currentTarget.lng]], {color: '#e74c3c', weight: 4}).addTo(map);
    
    setTimeout(() => { 
        isLocked = false; 
        round++;
        loadNextQuestion(); 
    }, 1500);
}

function loadNextQuestion() {
    if (round > 10) {
        finishGame();
        return;
    }
    if(polyline) map.removeLayer(polyline);
    currentTarget = remainingCities.pop();
    document.getElementById('task-ui').innerText = `第 ${round}/10 關：${currentTarget.name}`;
}

function finishGame() {
    saveScore();
    document.getElementById('map-page').style.display = 'none';
    document.getElementById('final-score').innerText = "總分: " + totalScore;
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    document.getElementById('result-page').style.display = 'flex';
}

function saveScore() {
    try {
        let scores = JSON.parse(localStorage.getItem('geoScores') || '{}');
        // 確保結構一定為物件
        if (typeof scores !== 'object' || Array.isArray(scores)) scores = {};
        
        if(!scores[currentCat]) scores[currentCat] = [];
        scores[currentCat].push(totalScore);
        scores[currentCat].sort((a,b) => b - a);
        scores[currentCat] = scores[currentCat].slice(0, 5);
        
        localStorage.setItem('geoScores', JSON.stringify(scores));
    } catch (e) {
        // 如果 localStorage 錯誤，直接重置，避免 APP 打不開
        localStorage.clear();
    }
}

function renderLeaderboard() {
    // 1. 強制讀取並解析
    let rawData = localStorage.getItem('geoScores');
    console.log("正在讀取排行榜，原始資料為:", rawData); 

    if (!rawData) {
        console.log("警告: localStorage 裡沒有 geoScores");
        document.querySelectorAll('[id^="lb-"]').forEach(el => el.innerHTML = "尚無挑戰紀錄");
        return;
    }

    let scores = JSON.parse(rawData);
    console.log("解析後的物件結構:", scores);

    // 2. 針對三個分類進行更新
    ['首都', '地標', '自然'].forEach(cat => {
        let container = document.getElementById('lb-' + cat);
        
        // 檢查該分類下是否有資料
        if (scores[cat] && Array.isArray(scores[cat]) && scores[cat].length > 0) {
            // 渲染列表
            container.innerHTML = scores[cat].map((s, i) => `${i+1}. ${s}分`).join('<br>');
        } else {
            container.innerHTML = '尚無挑戰紀錄';
        }
    });
}
