<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>地理小遊戲</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { height: 500px; width: 100%; }
        #ui { padding: 10px; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">點擊地圖開始遊戲</div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const cities = [
            { name: "台北", lat: 25.033, lng: 121.565 },
            { name: "東京", lat: 35.676, lng: 139.650 },
            { name: "巴黎", lat: 48.856, lng: 2.352 }
        ];

        let currentTarget;
        function nextQuestion() {
            currentTarget = cities[Math.floor(Math.random() * cities.length)];
            document.getElementById('ui').innerText = "請找到：" + currentTarget.name;
        }

        map.on('click', function(e) {
            const dist = map.distance(e.latlng, [currentTarget.lat, currentTarget.lng]);
            alert("距離目標 " + Math.round(dist/1000) + " 公里！");
            nextQuestion();
        });

        nextQuestion();
    </script>
</body>
</html>
