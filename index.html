<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>地理定位大挑戰</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        .page { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: #2c3e50; color: white; }
        #map-page { display: none; height: 100vh; width: 100vw; position: relative; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; width: 100%; height: 100%; cursor: crosshair; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 60px; background: rgba(44, 62, 80, 0.8); display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; pointer-events: none; z-index: 1000; }
        #score-board { position: absolute; top: 70px; right: 20px; z-index: 1000; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; color: #f1c40f; font-size: 20px; font-weight: bold; }
        #score-popup { position: absolute; top: 150px; right: 20px; z-index: 1001; font-size: 30px; font-weight: bold; color: #2ecc71; opacity: 0; transition: all 1s; }
        
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 8px; border: none; background: #3498db; color: white; margin: 10px; }
    </style>
</head>
<body>
    <div id="home-page" class="page" style="display: flex;">
        <h1>地理定位大挑戰</h1>
        <button onclick="startGame()">開始遊戲</button>
        <div id="leaderboard-display" style="margin-top:20px; text-align:center;"></div>
    </div>
    <div id="map-page">
        <div id="ui">請點擊目標城市</div>
        <div id="score-board">總分: 0</div>
        <div id="score-popup">+0</div>
        <div id="map"></div>
    </div>
    <div id="result-page" class="page">
        <h2 id="final-score"></h2>
        <button onclick="location.reload()">回首頁</button>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        let map, polyline, round, totalScore, currentTarget, remainingCities;
        const cityList = [{ name: "台北", lat: 25.033, lng: 121.565 }, { name: "東京", lat: 35.676, lng: 139.650 }, { name: "巴黎", lat: 48.856, lng: 2.352 }, { name: "倫敦", lat: 51.507, lng: -0.127 }, { name: "紐約", lat: 40.712, lng: -74.006 }, { name: "雪梨", lat: -33.868, lng: 151.209 }];

        window.onload = () => {
            renderLeaderboard();
            map = L.map('map', { attributionControl: false, minZoom: 2, maxZoom: 6, zoomControl: false }).setView([20, 0], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', { subdomains: 'abcd' }).addTo(map);
            
            map.on('click', (e) => {
                if (document.getElementById('map-page').style.display !== 'block') return;
                
                let possibleLngs = [currentTarget.lng, currentTarget.lng - 360, currentTarget.lng + 360];
                let minDist = Infinity;
                let bestTarget = [currentTarget.lat, currentTarget.lng];

                possibleLngs.forEach(lng => {
                    let d = map.distance(e.latlng, [currentTarget.lat, lng]);
                    if (d < minDist) { minDist = d; bestTarget = [currentTarget.lat, lng]; }
                });

                const pts = Math.max(0, 100 - Math.floor(minDist / 50000));
                totalScore += pts;
                updateScore(pts);

                if(polyline) map.removeLayer(polyline);
                polyline = L.polyline([e.latlng, bestTarget], {color: '#e74c3c', weight: 4}).addTo(map);
                
                round++;
                setTimeout(nextRound, 1500);
            });
        }; // <--- 這裡補上了 window.onload 的閉合括號

        function updateScore(pts) {
            document.getElementById('score-board').innerText = "總分: " + totalScore;
            const popup = document.getElementById('score-popup');
            popup.innerText = "+" + pts;
            popup.style.opacity = 1; popup.style.top = "120px";
            setTimeout(() => { popup.style.opacity = 0; popup.style.top = "150px"; }, 1000);
        }

        function startGame() {
            round = 1; totalScore = 0;
            remainingCities = [...cityList].sort(() => Math.random() - 0.5);
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('map-page').style.display = 'block';
            map.invalidateSize();
            nextRound();
        }

        function nextRound() {
            if (round > 5) {
                saveScore(totalScore);
                document.getElementById('final-score').innerText = "最終得分：" + totalScore;
                document.getElementById('map-page').style.display = 'none';
                document.getElementById('result-page').style.display = 'flex';
                return;
            }
            if(polyline) map.removeLayer(polyline);
            currentTarget = remainingCities.pop();
            document.getElementById('ui').innerText = `請找到 ${currentTarget.name}`;
        }

        function saveScore(score) {
            let s = JSON.parse(localStorage.getItem('geoScores') || '[]');
            s.push(score); s.sort((a,b) => b-a);
            localStorage.setItem('geoScores', JSON.stringify(s.slice(0, 5)));
            renderLeaderboard();
        }

        function renderLeaderboard() {
            let s = JSON.parse(localStorage.getItem('geoScores') || '[]');
            document.getElementById('leaderboard-display').innerHTML = "<h3>排行榜</h3>" + (s.length ? s.map((v,i) => `${i+1}. ${v} 分`).join('<br>') : "暫無紀錄");
        }
    </script>
</body>
</html>
