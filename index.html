<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>地理定位大挑戰</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        .page { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: #2c3e50; color: white; }
        
        /* 強制地圖貼齊螢幕上下緣 */
        #map-page { display: none; height: 100vh; width: 100vw; position: relative; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; width: 100%; height: 100%; cursor: crosshair; }
        #ui { position: absolute; top: 0; z-index: 1000; width: 100%; height: 60px; background: rgba(44, 62, 80, 0.9); display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; pointer-events: none; }
        
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 8px; border: none; background: #3498db; color: white; margin: 10px; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>

    <div id="home-page" class="page" style="display: flex;">
        <h1>地理定位大挑戰</h1>
        <button onclick="showPage('game-setup')">開始遊戲</button>
        <button onclick="showLeaderboard()">排行榜</button>
    </div>

    <div id="game-setup" class="page">
        <h2>選擇模式</h2>
        <button onclick="startGame(1)">模式一：精準定位</button>
        <button onclick="startGame(2)">模式二：距離評分</button>
        <button onclick="showPage('home-page')">回首頁</button>
    </div>

    <div id="map-page">
        <div id="ui">請點擊地圖開始</div>
        <div id="map"></div>
    </div>

    <div id="result-page" class="page">
        <h2 id="final-score"></h2>
        <button onclick="showPage('home-page')">回首頁</button>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        let map, polyline, mode, round, totalScore, currentTarget, remainingCities;
        const cityList = [
            { name: "台北", lat: 25.033, lng: 121.565 }, { name: "東京", lat: 35.676, lng: 139.650 },
            { name: "巴黎", lat: 48.856, lng: 2.352 }, { name: "倫敦", lat: 51.507, lng: -0.127 },
            { name: "紐約", lat: 40.712, lng: -74.006 }, { name: "雪梨", lat: -33.868, lng: 151.209 },
            { name: "開羅", lat: 30.044, lng: 31.235 }, { name: "莫斯科", lat: 55.755, lng: 37.617 },
            { name: "柏林", lat: 52.520, lng: 13.405 }, { name: "羅馬", lat: 41.902, lng: 12.496 },
            { name: "曼谷", lat: 13.756, lng: 100.501 }, { name: "首爾", lat: 37.566, lng: 126.978 },
            { name: "北京", lat: 39.904, lng: 116.407 }, { name: "新加坡", lat: 1.352, lng: 103.819 },
            { name: "杜拜", lat: 25.204, lng: 55.270 }, { name: "伊斯坦堡", lat: 41.008, lng: 28.978 },
            { name: "里約熱內盧", lat: -22.906, lng: -43.172 }, { name: "華盛頓", lat: 38.907, lng: -77.036 },
            { name: "墨西哥城", lat: 19.432, lng: -99.133 }, { name: "雅典", lat: 37.983, lng: 23.727 },
            { name: "馬德里", lat: 40.416, lng: -3.703 }, { name: "阿姆斯特丹", lat: 52.367, lng: 4.904 },
            { name: "維也納", lat: 48.208, lng: 16.373 }, { name: "雅加達", lat: -6.208, lng: 106.845 },
            { name: "多倫多", lat: 43.653, lng: -79.383 }, { name: "孟買", lat: 19.076, lng: 72.877 },
            { name: "開普敦", lat: -33.924, lng: 18.424 }, { name: "布宜諾斯艾利斯", lat: -34.603, lng: -58.381 },
            { name: "里斯本", lat: 38.722, lng: -9.139 }, { name: "奧斯陸", lat: 59.913, lng: 10.752 }
        ];

        window.onload = function() {
            map = L.map('map', { attributionControl: false, minZoom: 2, maxZoom: 6, zoomControl: false }).setView([20, 0], 2);
            // 使用最穩定的開源圖層
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            map.on('click', function(e) {
                if (document.getElementById('map-page').style.display !== 'block') return;
                const dist = map.distance(e.latlng, [currentTarget.lat, currentTarget.lng]);
                if(polyline) map.removeLayer(polyline);
                polyline = L.polyline([e.latlng, [currentTarget.lat, currentTarget.lng]], {color: '#e74c3c'}).addTo(map);
                
                let pts = (mode === 1) ? (dist < 100000 ? 100 : 0) : Math.max(0, 100 - Math.floor(dist / 50000));
                totalScore += pts;
                round++;
                setTimeout(nextRound, 1000);
            });
        };

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById('map-page').style.display = (id === 'map-page') ? 'block' : 'none';
            if(id === 'map-page') { setTimeout(() => map.invalidateSize(), 100); }
            document.getElementById(id).style.display = (id === 'map-page') ? 'block' : 'flex';
        }

        function startGame(m) {
            mode = m; round = 1; totalScore = 0;
            remainingCities = [...cityList].sort(() => Math.random() - 0.5);
            showPage('map-page');
            nextRound();
        }

        function nextRound() {
            if (round > 10) {
                document.getElementById('final-score').innerText = "總得分：" + totalScore;
                saveScore(totalScore);
                document.getElementById('map-page').style.display = 'none';
                showPage('result-page');
                return;
            }
            if(polyline) map.removeLayer(polyline);
            currentTarget = remainingCities.pop();
            document.getElementById('ui').innerText = `第 ${round} 關：請找到 ${currentTarget.name}`;
        }

        function saveScore(score) {
            let s = JSON.parse(localStorage.getItem('geoGameScores') || '[]');
            s.push(score); s.sort((a,b) => b-a);
            localStorage.setItem('geoGameScores', JSON.stringify(s.slice(0, 10)));
        }

        function showLeaderboard() {
            let s = JSON.parse(localStorage.getItem('geoGameScores') || '[]');
            alert("【排行榜 前10名】\n\n" + (s.length ? s.map((v,i) => `${i+1}. ${v} 分`).join('\n') : "暫無紀錄"));
        }
    </script>
</body>
</html>
